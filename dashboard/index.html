<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mqquant Strategy Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #607080;
        --line: #d8dee6;
        --accent: #1f6feb;
        --profit: #16833a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        padding: 20px 28px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        font-weight: 700;
      }

      main {
        display: grid;
        gap: 18px;
        padding: 20px 28px 36px;
      }

      .meta {
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 12px 22px;
        font-size: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      h2 {
        font-size: 17px;
        margin: 0 0 14px;
      }

      .chart-grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      .chart-box {
        min-height: 320px;
      }

      table {
        border-collapse: collapse;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 11px 10px;
        text-align: right;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      th:nth-child(2),
      td:nth-child(2) {
        text-align: left;
      }

      tbody tr:hover {
        background: #f0f4f8;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
      }

      .error {
        color: #b42318;
        font-weight: 600;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header>
      <h1>mqquant Strategy Dashboard</h1>
      <div class="meta">
        <span id="run-id">run_id: loading</span>
        <span id="generated-at">generated_at: loading</span>
        <span id="summary">strategies: loading</span>
      </div>
    </header>

    <main>
      <section class="panel">
        <h2>Top10 Ranking</h2>
        <p id="status" class="status">Loading sample_ranking.json...</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Strategy Name</th>
                <th>Score</th>
                <th>Total Profit</th>
                <th>Pass Rate</th>
                <th>MDD</th>
                <th>PF</th>
              </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
          </table>
        </div>
      </section>

      <section class="chart-grid">
        <div class="panel chart-box">
          <h2>Top10 Score</h2>
          <canvas id="score-chart"></canvas>
        </div>
        <div class="panel chart-box">
          <h2>Top10 Profit</h2>
          <canvas id="profit-chart"></canvas>
        </div>
      </section>
    </main>
  </body>
</html>
